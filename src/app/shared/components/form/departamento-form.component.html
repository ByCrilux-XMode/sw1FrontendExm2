<div class="container mt-5">
  <div class="card shadow border-0">
    <div class="card-header bg-primary text-white p-3">
      <h4 class="mb-0"><i class="bi bi-building"></i> {{ isEdit ? 'Editar' : 'Nuevo' }} Departamento</h4>
    </div>
    <div class="card-body p-4">
      <form [formGroup]="deptForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label fw-bold">Nombre del Departamento</label>
          <input type="text" class="form-control" formControlName="nombre" placeholder="Ej. Recursos Humanos">
        </div>
        
        <div class="mb-3">
          <label class="form-label fw-bold">Descripción</label>
          <textarea class="form-control" formControlName="descripcion" rows="4" placeholder="Describa el área..."></textarea>
        </div>

        <div class="form-check form-switch mb-4" *ngIf="isEdit">
          <input class="form-check-input" type="checkbox" formControlName="activo">
          <label class="form-check-label">Departamento Activo</label>
        </div>

        <div class="d-flex justify-content-end gap-2">
          <button type="button" class="btn btn-outline-secondary" routerLink="/admin/departamentos">Cancelar</button>
          <button type="submit" class="btn btn-primary" [disabled]="deptForm.invalid">
            <i class="bi bi-save"></i> {{ isEdit ? 'Actualizar' : 'Registrar' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
