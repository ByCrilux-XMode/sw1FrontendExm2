<div class="container mt-4">
  <div class="card shadow-sm border-0">
    <div class="card-header bg-primary text-white py-3">
      <h4 class="mb-0"><i class="bi bi-person-plus-fill"></i> Registrar Nuevo Usuario</h4>
    </div>
    <div class="card-body p-4">
      <form [formGroup]="usuarioForm" (ngSubmit)="onSubmit()">
        <div class="row g-3">
          <h5 class="text-secondary border-bottom pb-2">Datos de Cuenta</h5>
          <div class="col-md-4">
            <label class="form-label">Nombre de Usuario</label>
            <input type="text" class="form-control" formControlName="username">
          </div>
          <div class="col-md-4">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="email">
          </div>
          <div class="col-md-4">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" formControlName="password">
          </div>
          <div class="col-md-4">
            <label class="form-label">Rol del Sistema</label>
            <select class="form-select" formControlName="rol">
              <option *ngFor="let rol of roles" [value]="rol">{{ rol }}</option>
            </select>
          </div>

          <h5 class="text-secondary border-bottom pb-2 mt-4">Información Personal</h5>
          <div class="col-md-6">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" formControlName="nombre">
          </div>
          <div class="col-md-6">
            <label class="form-label">Apellido</label>
            <input type="text" class="form-control" formControlName="apellido">
          </div>
          <div class="col-md-6">
            <label class="form-label">Teléfono</label>
            <input type="text" class="form-control" formControlName="telefono">
          </div>
          <div class="col-md-6">
            <label class="form-label">CI (Cédula de Identidad)</label>
            <input type="text" class="form-control" formControlName="ci">
          </div>
        </div>

        <div class="mt-4 d-flex justify-content-end gap-2">
          <button type="button" class="btn btn-outline-secondary" routerLink="/admin/usuarios">Cancelar</button>
          <button type="submit" class="btn btn-primary" [disabled]="usuarioForm.invalid">
            Guardar Usuario
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
