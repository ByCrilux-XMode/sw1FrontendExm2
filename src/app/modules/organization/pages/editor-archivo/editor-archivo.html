<div class="editor-layout">
    <header class="d-flex justify-content-between align-items-center p-3 bg-light border-bottom">
        <div class="d-flex align-items-center">
            <button class="btn btn-outline-secondary me-3" (click)="volver()">
                <i class="bi bi-arrow-left"></i> Volver
            </button>
            <h5 class="m-0 text-truncate" style="max-width: 400px;">
                <i class="bi" [ngClass]="isTxtFile() ? 'bi-file-text' : 'bi-file-word'"></i>
                {{ s3Key() }}
            </h5>
        </div>

        <div class="d-flex align-items-center">

            <!-- ── Avatar stack de usuarios conectados ── -->
            <div class="avatar-stack me-3" *ngIf="usuariosConectados.length > 0">
                <div
                    *ngFor="let usuario of usuariosConectados"
                    class="avatar-circle"
                    [style.backgroundColor]="usuario.color"
                    [title]="usuario.name">
                    {{ usuario.name | slice:0:1 | uppercase }}
                </div>
            </div>

            <span class="badge bg-fire me-3 rounded-pill" style="background-color: #f58220;">
                <i class="bi bi-fire"></i> Estado Efímero (Firebase)
            </span>
            <button class="btn btn-primary" (click)="guardar()" [disabled]="isSaving() || isLoading()">
                <span *ngIf="isSaving()" class="spinner-border spinner-border-sm me-1" role="status"
                    aria-hidden="true"></span>
                <i *ngIf="!isSaving()" class="bi bi-cloud-arrow-up me-1"></i>
                Consolidar en S3
            </button>
        </div>
    </header>

    <div class="toolbar p-2 bg-white border-bottom" *ngIf="!isTxtFile() && editor">
        <div class="btn-group me-2">
            <button class="btn btn-light" [class.active]="editor.isActive('bold')"
                (click)="editor.chain().focus().toggleBold().run()">
                <i class="bi bi-type-bold"></i>
            </button>
            <button class="btn btn-light" [class.active]="editor.isActive('italic')"
                (click)="editor.chain().focus().toggleItalic().run()">
                <i class="bi bi-type-italic"></i>
            </button>
            <button class="btn btn-light" [class.active]="editor.isActive('strike')"
                (click)="editor.chain().focus().toggleStrike().run()">
                <i class="bi bi-type-strikethrough"></i>
            </button>
        </div>

        <div class="btn-group me-2">
            <button class="btn btn-light" [class.active]="editor.isActive('heading', { level: 1 })"
                (click)="editor.chain().focus().toggleHeading({ level: 1 }).run()">
                <i class="bi bi-type-h1"></i>
            </button>
            <button class="btn btn-light" [class.active]="editor.isActive('heading', { level: 2 })"
                (click)="editor.chain().focus().toggleHeading({ level: 2 }).run()">
                <i class="bi bi-type-h2"></i>
            </button>
        </div>

        <div class="btn-group me-2">
            <button class="btn btn-light" [class.active]="editor.isActive('bulletList')"
                (click)="editor.chain().focus().toggleBulletList().run()">
                <i class="bi bi-list-ul"></i>
            </button>
            <button class="btn btn-light" [class.active]="editor.isActive('orderedList')"
                (click)="editor.chain().focus().toggleOrderedList().run()">
                <i class="bi bi-list-ol"></i>
            </button>
            <button class="btn btn-light" [class.active]="editor.isActive('blockquote')"
                (click)="editor.chain().focus().toggleBlockquote().run()">
                <i class="bi bi-chat-square-quote"></i>
            </button>
        </div>

        <!-- Color de texto -->
        <div class="btn-group me-2 align-items-center">
            <label class="btn btn-light d-flex align-items-center gap-1" title="Color de texto">
                <i class="bi bi-palette-fill"></i>
                <input type="color" (input)="cambiarColor($event)"
                    style="width: 22px; height: 22px; padding: 0; border: none; background: none; cursor: pointer; border-radius: 3px;">
            </label>
        </div>

        <!-- Insertar imagen -->
        <div class="btn-group me-2">
            <label class="btn btn-light" title="Insertar imagen">
                <i class="bi bi-image"></i>
                <input type="file" accept="image/*" style="display: none;"
                    (change)="subirEInsertarImagen($event)">
            </label>
        </div>

        <!-- Tablas -->
        <div class="btn-group me-2">
            <button class="btn btn-light btn-sm" title="Insertar tabla 3×3"
                (click)="editor.chain().focus().insertTable({ rows: 3, cols: 3, withHeaderRow: true }).run()">
                <i class="bi bi-table"></i>
            </button>
            <button class="btn btn-light btn-sm" title="Añadir fila"
                (click)="editor.chain().focus().addRowAfter().run()">
                +Fila
            </button>
            <button class="btn btn-light btn-sm" title="Añadir columna"
                (click)="editor.chain().focus().addColumnAfter().run()">
                +Col
            </button>
            <button class="btn btn-light btn-sm text-danger" title="Eliminar tabla"
                (click)="editor.chain().focus().deleteTable().run()">
                <i class="bi bi-trash"></i>
            </button>
        </div>

        <div class="btn-group">
            <button class="btn btn-light" (click)="editor.chain().focus().undo().run()"
                [disabled]="!editor.can().undo()">
                <i class="bi bi-arrow-counterclockwise"></i>
            </button>
            <button class="btn btn-light" (click)="editor.chain().focus().redo().run()"
                [disabled]="!editor.can().redo()">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
    </div>

    <div class="container mt-2" *ngIf="saveMessage()">
        <div class="alert" [ngClass]="'alert-' + saveMessage()?.type" role="alert">
            {{ saveMessage()?.text }}
        </div>
    </div>

    <div class="editor-container d-flex justify-content-center bg-light flex-grow-1 p-4">

        <div *ngIf="isLoading()" class="text-center mt-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Sincronizando Documento...</p>
        </div>

        <div class="editor-paper shadow-sm bg-white p-5 w-100"
            style="max-width: 800px; min-height: 800px; display: block;" [class.d-none]="isLoading()">
            <div #editorContainer></div>
        </div>
    </div>
</div>
